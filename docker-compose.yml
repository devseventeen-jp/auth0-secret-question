version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: auth0_mfa_db
      POSTGRES_USER: django_user
      POSTGRES_PASSWORD: django_password
    expose:
      - "5432"
    networks:
      - app-network

  auth-backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    expose:
      - "8000"
    depends_on:
      - db
    env_file:
      - .env
    networks:
      - app-network

  auth-frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    expose:
      - "3000"
    environment:
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
    env_file:
      - .env
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    name: auth0-app-network
